<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 200">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#4facfe;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#00f2fe;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <blur stdDeviation="5" />
    </filter>
  </defs>
  <rect width="100%" height="100%" fill="#0d1117" rx="15" />
  <circle cx="100" cy="100" r="50" fill="url(#grad1)" opacity="0.2">
    <animate attributeName="r" values="40;60;40" dur="4s" repeatCount="indefinite" />
  </circle>
  <circle cx="700" cy="100" r="30" fill="#00f2fe" opacity="0.1">
    <animate attributeName="cy" values="80;120;80" dur="5s" repeatCount="indefinite" />
  </circle>
  <text x="50%" y="45%" text-anchor="middle" font-family="Arial, sans-serif" font-size="48" font-weight="bold" fill="url(#grad1)">AWESOME ATTENTION</text>
  <text x="50%" y="65%" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" fill="#8b949e">A Curated List of Attention Mechanisms in AI &amp; Deep Learning</text>
  <line x1="300" y1="150" x2="500" y2="150" stroke="#8b949e" stroke-width="2" stroke-dasharray="5,5">
    <animate attributeName="stroke-dashoffset" from="0" to="100" dur="10s" repeatCount="indefinite" />
  </line>
</svg>
